name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build
      run: make build

    - name: Vet
      run: go vet ./...

    - name: Test
      run: make test

    - name: Vulnerability check
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
